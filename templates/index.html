<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hamdy Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: #2a2a3e;
  --accent: #6c63ff;
  --accent2: #ff6b9d;
  --accent3: #00d4aa;
  --gold: #ffd700;
  --text: #e8e8f0;
  --text-dim: #7a7a9a;
  --team1: #4f8ef7;
  --team2: #f7614f;
  --card-yellow: #f59e0b;
  --card-red: #ef4444;
  --hole: #8b5cf6;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background: radial-gradient(ellipse 80% 50% at 20% 20%,rgba(108,99,255,.08) 0%,transparent 60%),
              radial-gradient(ellipse 60% 40% at 80% 80%,rgba(255,107,157,.06) 0%,transparent 60%);
}

/* ===== PAGES ===== */
.page { display:none !important; position:relative; z-index:1; }
.page.active { display:block !important; }
#auth-page.active, #setup-page.active, #end-page.active { display:flex !important; flex-direction:column; align-items:center; }

/* ===== USER CONTROLS ===== */
.user-header-controls { position: absolute; top: 20px; left: 20px; z-index: 10; display: flex; align-items: center; gap: 10px; }
.user-header-controls span { color: var(--text-dim); font-weight: bold; font-size: 14px; }
.user-header-controls button { background: transparent; border: 1px solid var(--accent2); color: var(--accent2); padding: 5px 15px; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; font-size: 13px; transition: all 0.2s; }
.user-header-controls button:hover { background: rgba(255, 107, 157, 0.1); }

/* ===== AUTH ===== */
#auth-page { min-height:100vh; padding:40px 20px; justify-content: center; }
.auth-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:40px; width:100%; max-width:400px; text-align:center; }
.auth-switch { margin-top: 15px; color: var(--text-dim); font-size: 14px; cursor: pointer; transition: color .3s; }
.auth-switch:hover { color: var(--accent); }

/* ===== SETUP ===== */
#setup-page { min-height:100vh; padding:40px 20px; }
.logo { text-align:center; margin-bottom:50px; }
.logo h1 { font-family:'Tajawal',sans-serif; font-size:72px; font-weight:900; letter-spacing:-2px; line-height:1;
  background:linear-gradient(135deg,var(--accent),var(--accent2),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.logo p { color:var(--text-dim); font-size:16px; margin-top:8px; letter-spacing:4px; text-transform:uppercase; }
.teams-setup { display:grid; grid-template-columns:1fr 1fr; gap:24px; width:100%; max-width:900px; margin-bottom:40px; }
.team-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:28px; }
.team-card.team1 { border-top:3px solid var(--team1); }
.team-card.team2 { border-top:3px solid var(--team2); }
.team-card h3 { font-size:18px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.team1 h3 { color:var(--team1); } .team2 h3 { color:var(--team2); }
.team-dot { width:10px; height:10px; border-radius:50%; }
.team1 .team-dot { background:var(--team1); } .team2 .team-dot { background:var(--team2); }
.input-field { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:12px 16px;
  color:var(--text); font-family:'Cairo',sans-serif; font-size:15px; outline:none; transition:border-color .3s,box-shadow .3s; margin-bottom:12px; }
.input-field:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(108,99,255,.15); }
.players-section { margin-top:8px; }
.players-section label { font-size:13px; color:var(--text-dim); display:block; margin-bottom:8px; }
.player-input-row { display:flex; gap:8px; margin-bottom:8px; align-items:center; }
.player-input-row .input-field { margin-bottom:0; flex:1; }
.player-num { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; }
.team1 .player-num { background:rgba(79,142,247,.2); color:var(--team1); }
.team2 .player-num { background:rgba(247,97,79,.2); color:var(--team2); }
.btn-add-player { width:100%; padding:10px; border:1px dashed var(--border); border-radius:10px; background:transparent; color:var(--text-dim);
  cursor:pointer; font-family:'Cairo',sans-serif; font-size:14px; transition:all .2s; margin-top:4px; display:flex; align-items:center; justify-content:center; gap:6px; }
.btn-add-player:hover { border-color:var(--accent); color:var(--accent); background:rgba(108,99,255,.05); }
.btn-remove-player { width:28px; height:28px; border-radius:50%; background:rgba(255,107,157,.1); border:none; color:var(--accent2);
  cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .2s; }
.btn-remove-player:hover { background:rgba(255,107,157,.25); }

/* ===== CATEGORIES ===== */
#categories-page { min-height:100vh; padding:40px 20px; max-width:1100px; margin:0 auto; }
.page-header { text-align:center; margin-bottom:40px; }
.page-header h2 { font-size:36px; font-weight:900; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.page-header p { color:var(--text-dim); margin-top:8px; font-size:15px; }
.selected-count { display:inline-block; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:6px 20px; font-size:14px; margin-top:12px; }
.selected-count span { color:var(--accent); font-weight:700; font-size:18px; }
.group-section { margin-bottom:32px; }
.group-title { font-size:14px; font-weight:700; color:var(--text-dim); letter-spacing:3px; text-transform:uppercase; margin-bottom:14px; padding-right:12px; border-right:3px solid var(--accent); }
.categories-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; }
.cat-card { background:var(--surface); border:2px solid var(--border); border-radius:16px; padding:18px 14px; cursor:pointer; transition:all .25s; text-align:center; position:relative; }
.cat-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 8px 24px rgba(108,99,255,.2); }
.cat-card.selected { border-color:var(--accent); background:rgba(108,99,255,.1); box-shadow:0 0 0 1px var(--accent),0 8px 24px rgba(108,99,255,.2); }
.cat-card.selected::after { content:'✓'; position:absolute; top:8px; left:8px; width:22px; height:22px; background:var(--accent); border-radius:50%; font-size:12px; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; }
.cat-card.no-games { opacity:.4; cursor:not-allowed; }
.cat-name { font-size:15px; font-weight:700; margin-bottom:8px; }
.cat-games-left { font-size:12px; color:var(--text-dim); }
.cat-games-left.good { color:var(--accent3); } .cat-games-left.warn { color:var(--gold); } .cat-games-left.bad { color:var(--accent2); }

/* ===== BUTTONS ===== */
.btn-primary { background:linear-gradient(135deg,var(--accent),#8b83ff); color:white; border:none; border-radius:14px; padding:16px 40px;
  font-family:'Cairo',sans-serif; font-size:17px; font-weight:700; cursor:pointer; transition:all .3s; box-shadow:0 4px 20px rgba(108,99,255,.4); display:block; margin:0 auto; width: 100%; max-width: 300px; }
.btn-primary:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 30px rgba(108,99,255,.5); }
.btn-primary:disabled { opacity:.4; cursor:not-allowed; transform:none; }
.btn-back { background:var(--surface2); border:1px solid var(--border); color:var(--text-dim); border-radius:10px; padding:10px 20px;
  font-family:'Cairo',sans-serif; font-size:14px; cursor:pointer; transition:all .2s; margin-bottom:24px; display:inline-flex; align-items:center; gap:6px; }
.btn-back:hover { border-color:var(--accent); color:var(--text); }

/* ===== GAME HEADER & END BUTTON ===== */
#game-page { min-height:100vh; padding:12px; }
.btn-end-game { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.4); color:var(--card-red); padding:8px 16px; border-radius:10px; font-family:'Cairo',sans-serif; font-size:13px; font-weight:bold; cursor:pointer; transition:all .2s; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; margin-right: auto; }
.btn-end-game:hover { background:rgba(239,68,68,.2); }

.game-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; padding:12px 20px;
  background:var(--surface); border-radius:16px; border:1px solid var(--border); }
.score-display { display:flex; align-items:center; gap:16px; }
.team-score-box { text-align:center; min-width:130px; }
.team-score-box .team-name { font-size:12px; font-weight:600; margin-bottom:2px; }
.team-score-box .score-row { display:flex; align-items:center; justify-content:center; gap:6px; }
.score-val { font-size:30px; font-weight:900; line-height:1; }
.team1-color { color:var(--team1); } .team2-color { color:var(--team2); }
.score-adj-btn { width:24px; height:24px; border-radius:6px; border:1px solid; cursor:pointer; font-size:14px; font-weight:700;
  display:flex; align-items:center; justify-content:center; background:transparent; transition:all .15s; }
.score-adj-btn.plus { border-color:var(--accent3); color:var(--accent3); }
.score-adj-btn.plus:hover { background:rgba(0,212,170,.15); }
.score-adj-btn.minus { border-color:var(--accent2); color:var(--accent2); }
.score-adj-btn.minus:hover { background:rgba(255,107,157,.15); }
.score-divider { font-size:24px; color:var(--border); font-weight:300; }
.game-title-small { font-size:22px; font-weight:900; background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.turn-indicator { font-size:12px; padding:4px 12px; border-radius:20px; font-weight:700; display:inline-block; }
.turn-indicator.t1 { background:rgba(79,142,247,.15); color:var(--team1); border:1px solid rgba(79,142,247,.3); }
.turn-indicator.t2 { background:rgba(247,97,79,.15); color:var(--team2); border:1px solid rgba(247,97,79,.3); }

/* ===== GAME BOARD - 3x2 layout ===== */
.game-board-wrap { max-width:1100px; margin:0 auto; }
.game-board-row { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:14px; }
.category-node { display:flex; flex-direction:column; align-items:center; gap:8px; }
.cat-circle { position:relative; width:88px; height:88px; border-radius:50%; flex-shrink:0; }
.cat-circle::before { content:''; position:absolute; inset:-3px; border-radius:50%;
  background:conic-gradient(var(--accent),var(--accent2),var(--accent3),var(--accent)); z-index:0; opacity:.6; animation:spin 8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.cat-circle-inner { position:relative; z-index:1; background:var(--surface); border-radius:50%;
  width:100%; height:100%; display:flex; align-items:center; justify-content:center; text-align:center; padding:8px; font-size:11px; font-weight:700; line-height:1.3; }
.q-arms { display:flex; flex-direction:column; gap:5px; width:100%; }
.q-pair { display:flex; gap:5px; }
.q-btn { flex:1; padding:9px 4px; border:none; border-radius:9px; font-family:'Cairo',sans-serif; font-size:14px; font-weight:700;
  cursor:pointer; transition:all .25s; position:relative; }
.q-btn.pts-200 { background:rgba(79,142,247,.15); border:1px solid rgba(79,142,247,.3); color:#4f8ef7; }
.q-btn.pts-400 { background:rgba(0,212,170,.15); border:1px solid rgba(0,212,170,.3); color:#00d4aa; }
.q-btn.pts-600 { background:rgba(255,215,0,.15); border:1px solid rgba(255,215,0,.3); color:var(--gold); }
.q-btn.double { animation:pulse-gold 2s infinite; }
@keyframes pulse-gold { 0%,100% { box-shadow:0 0 8px rgba(255,215,0,.4); } 50% { box-shadow:0 0 20px rgba(255,215,0,.8),0 0 40px rgba(255,215,0,.3); } }
.q-btn:hover:not(.done) { transform:scale(1.06); filter:brightness(1.3); }
.q-btn.done { background:var(--surface2) !important; border-color:var(--border) !important; color:var(--text-dim) !important; text-decoration:line-through; cursor:not-allowed; transform:none !important; }

/* ===== QUESTION MODAL ===== */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); backdrop-filter:blur(8px); z-index:1000; justify-content:center; align-items:center; padding:16px; overflow-y:auto; }
.modal-overlay.open { display:flex; }
.modal-box { background:var(--surface); border:1px solid var(--border); border-radius:22px; width:100%; max-width:680px; max-height:92vh; overflow-y:auto;
  box-shadow:0 24px 80px rgba(0,0,0,.6); animation:modal-in .3s cubic-bezier(.34,1.56,.64,1); }
@keyframes modal-in { from { transform:scale(.85) translateY(20px); opacity:0; } to { transform:scale(1) translateY(0); opacity:1; } }
.modal-top { background:linear-gradient(135deg,var(--surface2),var(--bg)); padding:20px 24px 16px; border-bottom:1px solid var(--border); }
.modal-top-row { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
.modal-cat-label { font-size:11px; color:var(--text-dim); letter-spacing:3px; text-transform:uppercase; margin-bottom:8px; }
.modal-question-text { font-size:21px; font-weight:700; line-height:1.5; color:var(--text); flex:1; }
.double-reveal-badge { display:none; padding:6px 14px; background:linear-gradient(135deg,rgba(255,215,0,.2),rgba(255,170,0,.1));
  border:1px solid rgba(255,215,0,.4); border-radius:12px; color:var(--gold); font-size:13px; font-weight:700; text-align:center; animation:pulse-text 1s infinite; white-space:nowrap; }
.double-reveal-badge.shown { display:block; }
@keyframes pulse-text { 0%,100% { opacity:1; } 50% { opacity:.6; } }
.modal-pts-badge { display:inline-block; padding:4px 14px; border-radius:20px; font-size:13px; font-weight:700; margin-top:10px; }

/* Active power banner */
.active-power-banner { display:none; padding:8px 16px; border-radius:10px; font-size:13px; font-weight:700; margin-bottom:12px; text-align:center; }
.active-power-banner.shown { display:block; }
.active-power-banner.hole { background:rgba(139,92,246,.15); border:1px solid rgba(139,92,246,.3); color:var(--hole); }
.active-power-banner.red { background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.3); color:var(--card-red); }
.active-power-banner.yellow { background:rgba(245,158,11,.12); border:1px solid rgba(245,158,11,.3); color:var(--card-yellow); }

.modal-body { padding:16px 24px 20px; }

/* Timer row */
.timer-row { display:flex; align-items:center; gap:16px; margin-bottom:14px; background:var(--surface2); border-radius:14px; padding:12px 16px; }
.timer-ring-wrap { position:relative; width:68px; height:68px; flex-shrink:0; }
.timer-ring-wrap svg { transform:rotate(-90deg); width:100%; height:100%; }
.timer-circle-bg { fill:none; stroke:var(--border); stroke-width:5; }
.timer-circle-fg { fill:none; stroke-width:5; stroke-linecap:round; transition:stroke-dashoffset 1s linear,stroke .5s; stroke-dasharray:188; stroke-dashoffset:0; }
.timer-num { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:900; }
.timer-info { flex:1; }
.timer-label { font-size:12px; color:var(--text-dim); margin-bottom:2px; }
.timer-team-indicator { font-size:17px; font-weight:700; }

/* Phase controls */
.phase-controls { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
.btn-modal { padding:9px 16px; border-radius:10px; border:none; font-family:'Cairo',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; flex:1; }
.btn-start-timer { background:#f59e0b; color:#000; }
.btn-pass { background:#8b5cf6; color:white; }
.btn-reveal { background:var(--surface2); border:1px solid var(--border); color:var(--text); }
.btn-modal:hover:not(:disabled) { filter:brightness(1.15); transform:translateY(-1px); }
.btn-modal:disabled { opacity:.4; cursor:not-allowed; transform:none; }

/* In-modal power buttons */
.modal-powers { display:none; gap:8px; margin-bottom:12px; align-items:center; }
.modal-powers.shown { display:flex; flex-wrap:wrap; }
.modal-powers-label { font-size:12px; color:var(--text-dim); margin-bottom:6px; width: 100%; }
.modal-power-btn { padding:7px 14px; border-radius:9px; border:2px solid; cursor:pointer; font-family:'Cairo',sans-serif; font-size:12px; font-weight:700;
  background:transparent; transition:all .2s; display:flex; align-items:center; gap:5px; flex:1; justify-content:center; }
.modal-power-btn.hole-p { border-color:var(--hole); color:var(--hole); }
.modal-power-btn.yellow-p { border-color:var(--card-yellow); color:var(--card-yellow); }
.modal-power-btn.red-p { border-color:var(--card-red); color:var(--card-red); }
.modal-power-btn.double-ans-p { border-color:var(--accent3); color:var(--accent3); }
.modal-power-btn:hover:not(:disabled) { transform:scale(1.05); filter:brightness(1.2); }
.modal-power-btn:disabled, .modal-power-btn.used { opacity:.25; cursor:not-allowed; transform:none; }
.modal-power-btn.active-p { box-shadow:0 0 12px currentColor; filter:brightness(1.2); }

/* Answer */
.answer-section { display:none; background:rgba(0,212,170,.08); border:1px solid rgba(0,212,170,.2); border-radius:12px; padding:14px 18px; margin-bottom:12px; }
.answer-section.visible { display:block; }
.answer-label { font-size:11px; color:var(--accent3); letter-spacing:2px; margin-bottom:5px; }
.answer-text { font-size:19px; font-weight:700; color:var(--accent3); }

/* Scoring */
.scoring-section { display:none; }
.scoring-section.visible { display:block; }
.scoring-teams { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
.scoring-team-col { background:var(--surface2); border-radius:12px; padding:12px; }
.scoring-team-col.t1 { border-top:2px solid var(--team1); }
.scoring-team-col.t2 { border-top:2px solid var(--team2); }
.scoring-team-name { font-size:12px; font-weight:700; margin-bottom:8px; }
.t1 .scoring-team-name { color:var(--team1); } .t2 .scoring-team-name { color:var(--team2); }
.player-score-btn { width:100%; padding:7px 10px; margin-bottom:5px; background:var(--surface); border:1px solid var(--border); border-radius:8px;
  color:var(--text); font-family:'Cairo',sans-serif; font-size:12px; cursor:pointer; transition:all .2s; text-align:right; }
.player-score-btn:hover { border-color:var(--accent); background:rgba(108,99,255,.1); }
.player-score-btn.selected-winner { background:rgba(0,212,170,.15); border-color:var(--accent3); color:var(--accent3); font-weight:700; }
.btn-nobody { width:100%; padding:9px; background:var(--surface2); border:1px solid var(--border); border-radius:9px; color:var(--text-dim);
  font-family:'Cairo',sans-serif; font-size:13px; cursor:pointer; transition:all .2s; margin-bottom:8px; }
.btn-nobody:hover { border-color:var(--accent2); color:var(--accent2); }
.btn-confirm-score { width:100%; padding:12px; background:linear-gradient(135deg,var(--accent3),#00a88a); border:none; border-radius:11px;
  color:#000; font-family:'Cairo',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:all .2s; }
.btn-confirm-score:hover:not(:disabled) { filter:brightness(1.1); transform:translateY(-1px); }
.btn-confirm-score:disabled { opacity:.4; cursor:not-allowed; transform:none; }

/* ===== POWER MODALS ===== */
.power-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:1100; justify-content:center; align-items:center; padding: 16px; }
.power-modal.open { display:flex; }
.power-modal-box { background:va
